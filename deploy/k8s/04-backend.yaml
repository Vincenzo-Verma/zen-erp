# ── Auth Service ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: saas-erp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: auth-service
          image: REGISTRY/saas-erp/auth-service:latest
          ports:
            - containerPort: 50052
          envFrom:
            - secretRef:
                name: erp-secrets
          env:
            - name: AUTH_SERVICE_PORT
              value: "50052"
            - name: RUST_LOG
              value: "info"
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: saas-erp
spec:
  type: ClusterIP
  ports:
    - port: 50052
      targetPort: 50052
  selector:
    app: auth-service
---
