apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: saas-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: gateway
          image: REGISTRY/saas-erp/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: erp-secrets
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: AUTH_SERVICE_ADDR
              value: "http://auth-service:50052"
            - name: TENANCY_SERVICE_ADDR
              value: "http://tenancy-service:50053"
            - name: BILLING_SERVICE_ADDR
              value: "http://billing-service:50054"
            - name: SCHOOL_SERVICE_ADDR
              value: "http://school-service:50060"
            - name: RUST_LOG
              value: "info"
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: saas-erp
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gateway
