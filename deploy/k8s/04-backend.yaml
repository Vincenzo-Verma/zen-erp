# ── Health Check ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check
  namespace: saas-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-check
  template:
    metadata:
      labels:
        app: health-check
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: health-check
          image: REGISTRY/saas-erp/health-check:latest
          ports:
            - containerPort: 50051
          env:
            - name: HEALTH_CHECK_PORT
              value: "50051"
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits:   { memory: "128Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: health-check-service
  namespace: saas-erp
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: 50051
  selector:
    app: health-check
