# Kernel: API Gateway & Orchestrator (Rust)
# Receives traffic from Ingress; routes /api/<plugin>/... to plugin services with X-Tenant-ID.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kernel
  namespace: saas-erp
  labels:
    app: kernel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kernel
  template:
    metadata:
      labels:
        app: kernel
    spec:
      containers:
        - name: kernel
          image: saas-erp/kernel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RUST_LOG
              value: "saas_erp_kernel=info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kernel-service
  namespace: saas-erp
  labels:
    app: kernel
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kernel
