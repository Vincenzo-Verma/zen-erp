apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: saas-erp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: frontend
          image: REGISTRY/saas-erp/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits:   { memory: "128Mi", cpu: "250m" }
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: saas-erp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
